<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到我的个人主页</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333333;
            --accent-color: #2ea44f; /* GitHub 绿 */
            --card-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d1117;
                --text-color: #c9d1d9;
                --accent-color: #238636;
                --card-bg: #161b22;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 2.5rem;
            margin: 20px 0 10px;
        }

        .tagline {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        h2 {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
            margin-top: 0;
        }

        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="https://github.com/identicons/jason.png" alt="头像" class="profile-img">
            <h1>你好，我是 [你的名字] 👋</h1>
            <p class="tagline">专注于 [你的领域/例如：前端开发 / 数据分析 / 终身学习者]</p>
        </header>

        <section class="section">
            <h2>关于我 🧑‍💻</h2>
            <p>这里是一段简短的自我介绍。你可以写写你的兴趣爱好、目前正在研究的技术，或者你建这个网站的目的。</p>
            <p>用代码改变世界，或者只是纯粹地享受创造的乐趣。</p>
        </section>

        <section class="section">
            <h2>开源项目 🚀</h2>
            <ul>
                <li><strong><a href="#" style="color: var(--accent-color);">项目名称 A</a></strong> - 简短的项目描述，这个项目解决了什么问题。</li>
                <li><strong><a href="#" style="color: var(--accent-color);">项目名称 B</a></strong> - 另一个炫酷的项目介绍。</li>
            </ul>
        </section>

        <section class="section" style="background: transparent; box-shadow: none; text-align: center;">
            <h2>联系我 📬</h2>
            <div class="links">
                <a href="#" class="btn">GitHub</a>
                <a href="#" class="btn btn-secondary">个人博客</a>
                <a href="mailto:your-email@example.com" class="btn btn-secondary">电子邮箱</a>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 [你的名字]. Powered by GitHub Pages.</p>
    </footer>

</body>
</html>
